<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBreaker learn®</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <canvas id="bg-code"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="material-icons">terminal</span>
                <strong>CodeBreaker <span>learn®</span></strong>
            </div>
            <div class="nav-user">
                <span id="u-name"><span class="material-icons">account_circle</span> Гость</span>
                <button class="btn-icon" onclick="openModal()"><span class="material-icons">settings</span> Профиль</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="admin-panel" class="card admin-card" style="display:none;">
            <div class="card-header">
                <span class="material-icons">add_circle</span> <h3>Создать новый урок</h3>
            </div>
            <input type="text" id="p-title" placeholder="Название урока">
            <select id="p-cat">
                <option value="Python">Python</option>
                <option value="Html">Html</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Приложение">Приложение</option>
            </select>
            <textarea id="p-content" placeholder="Напишите здесь код или описание..."></textarea>
            <button class="btn-main" onclick="publish()"><span class="material-icons">publish</span> Опубликовать</button>
        </section>

        <div id="posts-feed"></div>
    </main>

    <div id="modal-bg" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="material-icons">person_outline</span>
                <h3>Настройки профиля</h3>
            </div>
            <div class="input-box">
                <span class="material-icons">badge</span>
                <input type="text" id="in-name" placeholder="Ваше имя">
            </div>
            <div class="input-box">
                <span class="material-icons">security</span>
                <input type="password" id="in-code" placeholder="Код администратора">
            </div>
            <div class="modal-footer">
                <button class="btn-main" onclick="saveProfile()">Сохранить</button>
                <button class="btn-ghost" onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
